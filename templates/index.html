<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Direction Coworking - TISNES</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #111827; /* Noir très élégant pour les boutons */
            --primary-hover: #374151;
            --bg-color: #F3F4F6; /* Gris très doux pour le fond */
            --card-bg: #FFFFFF;
            --text-main: #111827;
            --text-muted: #6B7280;
            --border-color: #D1D5DB;
            --input-focus: #3B82F6; /* Liseré bleu au clic */
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
        }

        .container {
            background-color: var(--card-bg);
            padding: 48px 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 420px;
            box-sizing: border-box;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            margin: 0 0 8px 0;
            font-size: 24px;
            font-weight: 600;
            text-align: center;
        }

        p.subtitle {
            color: var(--text-muted);
            text-align: center;
            margin: 0 0 32px 0;
            font-size: 15px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            font-size: 14px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--input-focus);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s ease;
            margin-top: 8px;
            font-family: inherit;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        .actions {
            margin-top: 24px;
            text-align: center;
        }

        .btn-secondary {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .btn-secondary:hover {
            color: var(--primary);
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Espace Direction</h1>
        <p class="subtitle">Ajouter un nouveau client au réseau</p>
        
        <form action="/ajouter" method="post">
            <div class="form-group">
                <label for="nom">Nom de l'entreprise</label>
                <input type="text" id="nom" name="nom" placeholder="Ex: Tech Solutions" required>
            </div>
            
            <div class="form-group">
                <label for="secteur">Secteur d'activité</label>
                <input type="text" id="secteur" name="secteur" placeholder="Ex: Intelligence Artificielle" required>
            </div>
            
            <div class="form-group">
                <label for="ville">Ville du Siège Social</label>
                <input type="text" id="ville" name="ville" placeholder="Ex: Strasbourg" required>
            </div>
            
            <button type="submit">Enregistrer dans la base</button>
        </form>

        <div class="actions">
            <a href="/rapport" class="btn-secondary">
                📄 Télécharger le rapport CSV
            </a>
        </div>
    </div>
</body>
</html>
