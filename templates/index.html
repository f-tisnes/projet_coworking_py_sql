<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Direction Coworking - TISNES</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #111827; --bg-color: #F3F4F6; --card-bg: #FFFFFF; --text-muted: #6B7280; --input-focus: #3B82F6; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); margin: 0; padding: 40px; color: #111827; }
        
        /* Layout en 3 colonnes pour le tableau de bord */
        .container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        @media (max-width: 1024px) { .container { grid-template-columns: 1fr; } }

        .card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            height: fit-content;
        }

        h1 { font-size: 18px; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 13px; font-weight: 600; }
        input, select { width: 100%; padding: 10px; border: 1px solid #D1D5DB; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
        input:focus, select:focus { outline: none; border-color: var(--input-focus); ring: 2px var(--input-focus); }
        
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 14px; color: white; }
        .btn-black { background: #111827; }
        .btn-blue { background: #2563EB; }
        .btn-green { background: #059669; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
    </style>
</head>
<body>

    <div style="text-align: center; margin-bottom: 40px;">
        <h2 style="margin: 0;">Système de Gestion Coworking</h2>
        <p style="color: var(--text-muted); font-size: 14px;">Interface d'administration - Francesca Tisnes</p>
    </div>

    <div class="container">
        
        <div class="card">
            <h1>🏢 1. Entreprise</h1>
            <form action="/ajouter_entreprise" method="post">
                <div class="form-group">
                    <label>Nom</label>
                    <input type="text" name="nom" placeholder="Ex: Google" required>
                </div>
                <div class="form-group">
                    <label>Secteur</label>
                    <input type="text" name="secteur" placeholder="Ex: Tech" required>
                </div>
                <div class="form-group">
                    <label>Ville</label>
                    <input type="text" name="ville" placeholder="Ex: Paris" required>
                </div>
                <button type="submit" class="btn-black">Créer Client</button>
            </form>
        </div>

        <div class="card">
            <h1>👤 2. Membre</h1>
            <form action="/ajouter_membre" method="post">
                <div class="form-group">
                    <label>Nom Complet</label>
                    <input type="text" name="nom_complet" placeholder="Ex: Jean Dupont" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="text" name="email" placeholder="Ex: j.dupont@mail.com" required>
                </div>
                <div class="form-group">
                    <label>Rattacher à l'entreprise</label>
                    <select name="entreprise_id" required>
                        <option value="">-- Choisir une société --</option>
                        {% for ent in entreprises %}
                            <option value="{{ ent.id }}">{{ ent.nom }}</option>
                        {% endfor %}
                    </select>
                </div>
                <button type="submit" class="btn-blue">Inscrire Membre</button>
            </form>
        </div>

        <div class="card">
            <h1>📅 3. Réservation</h1>
            <form action="/ajouter_reservation" method="post">
                <div class="form-group">
                    <label>Choisir le Membre</label>
                    <select name="membre_id" required>
                        <option value="">-- Qui réserve ? --</option>
                        {% for membre in membres %}
                            <option value="{{ membre.id }}">{{ membre.nom_complet }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Salle</label>
                    <select name="salle_id" required>
                        <option value="">-- Quel espace ? --</option>
                        {% for salle in salles %}
                            <option value="{{ salle.id }}">{{ salle.nom_salle }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Date & Heures</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="date" name="date_resa" required>
                        <input type="number" name="duree" value="2" min="1" max="12" style="width: 70px;">
                    </div>
                </div>
                <button type="submit" class="btn-green">Réserver</button>
            </form>
        </div>

    </div>
</body>
</html>
