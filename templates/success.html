<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Succès - TISNES Coworking</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --success-green: #10B981;
            --text-main: #111827;
            --text-muted: #6B7280;
            --bg-color: #F3F4F6;
            --card-bg: #FFFFFF;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .success-card {
            background-color: var(--card-bg);
            padding: 48px 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            text-align: center;
            max-width: 400px;
            width: 100%;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon-container {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
        }

        .success-icon {
            width: 72px;
            height: 72px;
            color: var(--success-green);
            animation: scaleIn 0.5s ease-out 0.2s both;
        }

        @keyframes scaleIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }

        h1 {
            margin: 0 0 12px 0;
            color: var(--text-main);
            font-size: 24px;
            font-weight: 600;
        }

        p {
            color: var(--text-muted);
            line-height: 1.6;
            margin: 0 0 32px 0;
            font-size: 15px;
        }

        .entreprise-name {
            font-weight: 600;
            color: var(--text-main);
        }

        .btn-back {
            display: inline-block;
            background-color: #FFFFFF;
            color: var(--text-main);
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 500;
            border: 1px solid #E5E7EB;
            transition: all 0.2s ease;
            width: 100%;
            box-sizing: border-box;
        }

        .btn-back:hover {
            background-color: #F9FAFB;
            border-color: #D1D5DB;
            transform: translateY(-1px);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
        }
    </style>
</head>
<body>

    <div class="success-card">
        <div class="icon-container">
            <svg class="success-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
        </div>

        <h1>Enregistrement validé</h1>
        <p>L'entreprise <span class="entreprise-name">{{ nom_entreprise }}</span> a bien été intégrée à la base de données SQL et est prête à l'emploi.</p>

        <a href="/" class="btn-back">Retour au tableau de bord</a>
    </div>

</body>
</html>
